<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Map Projection Tool</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f4f3ef; color: #1a1a18; height: 100vh; overflow: hidden; }
header { background: #1a1a18; color: #f4f3ef; padding: 14px 32px; display: flex; align-items: baseline; gap: 16px; height: 52px; }
header h1 { font-size: 15px; font-weight: 500; letter-spacing: 0.04em; }
header span { font-size: 12px; color: #888; }
.workspace { display: grid; grid-template-columns: 300px 1fr; height: calc(100vh - 52px); overflow: hidden; }
.sidebar { background: #fff; border-right: 1px solid #e0dfd8; padding: 20px; display: flex; flex-direction: column; gap: 16px; overflow-y: auto; }
.section-label { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: #888; margin-bottom: 8px; }
.control-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.control-row label { font-size: 13px; color: #444; }
select { width: 100%; padding: 7px 10px; font-size: 13px; border: 1px solid #e0dfd8; border-radius: 6px; background: #faf9f7; color: #1a1a18; cursor: pointer; margin-bottom: 4px; }
input[type="color"] { width: 32px; height: 24px; border: 1px solid #ddd; border-radius: 4px; padding: 2px; cursor: pointer; background: none; }
input[type="range"] { width: 100px; accent-color: #1a1a18; }
textarea { width: 100%; font-family: "SF Mono", "Fira Code", monospace; font-size: 12px; border: 1px solid #e0dfd8; border-radius: 6px; padding: 8px 10px; background: #faf9f7; color: #1a1a18; resize: vertical; min-height: 160px; line-height: 1.5; }
.hint { font-size: 11px; color: #999; margin-top: 5px; line-height: 1.5; }
.error-box { font-size: 11px; color: #c0392b; background: #fef0ef; border: 1px solid #f5c6c3; border-radius: 4px; padding: 6px 8px; margin-top: 6px; display: none; }
button { width: 100%; padding: 9px; border: none; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; transition: opacity 0.15s; }
button:hover { opacity: 0.85; }
.btn-preset { width: auto; padding: 4px 9px; border: 1px solid #e0dfd8; border-radius: 4px; font-size: 11px; font-weight: 500; cursor: pointer; background: #f4f3ef; color: #444; }
.btn-preset:hover { background: #e8e7e2; opacity: 1; }
#preset-buttons { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; }
.btn-primary  { background: #1a1a18; color: #f4f3ef; }
.btn-secondary { background: #e8e7e2; color: #1a1a18; margin-top: 6px; }
.map-area { display: flex; align-items: center; justify-content: center; padding: 20px; background: #f4f3ef; height: 100%; overflow: auto; }
#map-container { background: #fff; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); flex-shrink: 0; }
#map-container svg { display: block; }
.tooltip { position: fixed; background: #1a1a18; color: #f4f3ef; font-size: 12px; padding: 5px 10px; border-radius: 4px; pointer-events: none; opacity: 0; transition: opacity 0.15s; z-index: 999; white-space: nowrap; }
.toggle { position: relative; display: inline-block; width: 36px; height: 20px; flex-shrink: 0; }
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle-slider { position: absolute; cursor: pointer; inset: 0; background: #ccc; border-radius: 20px; transition: background 0.2s; }
.toggle-slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; top: 3px; background: #fff; border-radius: 50%; transition: transform 0.2s; }
.toggle input:checked + .toggle-slider { background: #1a1a18; }
.toggle input:checked + .toggle-slider:before { transform: translateX(16px); }
.status { font-size: 11px; color: #aaa; text-align: center; padding: 5px 0 0; }
</style>
</head>
<body>
<header>
  <h1>Map Projection Tool</h1>
  <span>SVG Export</span>
</header>
<div class="workspace">
  <aside class="sidebar">

    <section>
      <div class="section-label">Projection</div>
      <select id="proj-select" onchange="onProjectionChange()">
        <optgroup label="── Polyhedral">
          <option value="airocean">Airocean (Dymaxion)</option>
          <option value="icosahedral">Icosahedral</option>
          <option value="cahillkeyes">Cahill-Keyes</option>
          <option value="imago">Imago</option>
          <option value="butterfly_gnomonic">Butterfly (Gnomonic)</option>
          <option value="butterfly_waterman">Butterfly (Waterman)</option>
          <option value="tetrahedrallee">Tetrahedral Lee</option>
        </optgroup>
        <optgroup label="── Equal-area">
          <option value="equalearth">Equal Earth</option>
          <option value="mollweide">Mollweide</option>
          <option value="goode">Goode&#x27;s Homolosine</option>
          <option value="int_mollweide">Interrupted Mollweide</option>
          <option value="int_mollweide_hemi">Mollweide Hemispheres</option>
          <option value="int_boggs">Interrupted Boggs</option>
          <option value="int_sinumollweide">Interrupted Sinu-Mollweide</option>
          <option value="azimuthalequalarea">Azimuthal Equal Area</option>
          <option value="conicequalarea">Conic Equal Area (Albers)</option>
          <option value="cylindricalequalarea">Cylindrical Equal Area</option>
          <option value="sinusoidal">Sinusoidal</option>
          <option value="sinumollweide">Sinu-Mollweide</option>
          <option value="healpix">HEALPix</option>
          <option value="hammer">Hammer</option>
          <option value="eckert4">Eckert IV</option>
          <option value="eckert6">Eckert VI</option>
          <option value="hatano">Hatano</option>
          <option value="boggs">Boggs Eumorphic</option>
          <option value="bonne">Bonne</option>
        </optgroup>
        <optgroup label="── Compromise">
          <option value="naturalearth">Natural Earth I</option>
          <option value="naturalearth2">Natural Earth II</option>
          <option value="winkeltripel">Winkel Tripel</option>
          <option value="robinson">Robinson</option>
          <option value="miller">Miller Cylindrical</option>
          <option value="kavrayskiy">Kavrayskiy VII</option>
          <option value="patterson">Patterson</option>
          <option value="aitoff">Aitoff</option>
          <option value="august">August Epicycloidal</option>
          <option value="fahey">Fahey</option>
          <option value="times">Times</option>
          <option value="wagner4">Wagner IV</option>
          <option value="wagner6">Wagner VI</option>
          <option value="wagner7">Wagner VII</option>
          <option value="laskowski">Laskowski Tri-optimal</option>
          <option value="larrivee">Larrivée</option>
          <option value="ginzburg4">Ginzburg IV</option>
          <option value="ginzburg5">Ginzburg V</option>
          <option value="ginzburg8">Ginzburg VIII</option>
          <option value="ginzburg9">Ginzburg IX</option>
          <option value="baker">Baker Dinomic</option>
          <option value="nicolosi">Nicolosi Globular</option>
        </optgroup>
        <optgroup label="── Conformal">
          <option value="mercator">Mercator</option>
          <option value="transversemercator">Transverse Mercator</option>
          <option value="stereographic">Stereographic</option>
          <option value="conicconformal">Lambert Conic Conformal</option>
          <option value="gnomonic">Gnomonic</option>
        </optgroup>
        <optgroup label="── Azimuthal">
          <option value="orthographic">Orthographic (Globe)</option>
          <option value="azimuthalequidistant">Azimuthal Equidistant</option>
          <option value="conicequidistant">Conic Equidistant</option>
        </optgroup>
        <optgroup label="── Cylindrical / Other">
          <option value="equirectangular">Equirectangular</option>
          <option value="craster">Craster Parabolic</option>
          <option value="eckert1">Eckert I</option>
          <option value="eckert2">Eckert II</option>
          <option value="eckert3">Eckert III</option>
          <option value="eckert5">Eckert V</option>
          <option value="loximuthal">Loximuthal</option>
          <option value="collignon">Collignon</option>
          <option value="polyconic">Polyconic</option>
          <option value="vandergrinten">Van der Grinten I</option>
          <option value="vandergrinten2">Van der Grinten II</option>
          <option value="vandergrinten3">Van der Grinten III</option>
          <option value="vandergrinten4">Van der Grinten IV</option>
          <option value="wiechel">Wiechel</option>
          <option value="berghaus">Berghaus Star</option>
          <option value="gingery">Gingery</option>
        </optgroup>
      </select>
    </section>

    <section>
      <div class="section-label">Orientation</div>
      <div id="preset-buttons"></div>
      <div class="control-row">
        <label>&#955; lon</label>
        <input type="range" id="r-lambda" min="-180" max="180" value="0" step="1">
        <span id="r-lambda-val" style="font-size:11px;color:#888;min-width:32px;text-align:right">0&#176;</span>
      </div>
      <div class="control-row">
        <label>&#966; lat</label>
        <input type="range" id="r-phi" min="-90" max="90" value="0" step="1">
        <span id="r-phi-val" style="font-size:11px;color:#888;min-width:32px;text-align:right">0&#176;</span>
      </div>
      <div class="control-row">
        <label>&#947; roll</label>
        <input type="range" id="r-gamma" min="-180" max="180" value="0" step="1">
        <span id="r-gamma-val" style="font-size:11px;color:#888;min-width:32px;text-align:right">0&#176;</span>
      </div>
      <div style="margin-top:4px;padding:7px 10px;background:#f4f3ef;border-radius:5px;font-family:'SF Mono','Fira Code',monospace;font-size:11px;color:#666;user-select:all" id="rotate-readout">[0, 0, 0]</div>
    </section>

    <section>
      <div class="control-row"><label>Ocean</label><input type="color" id="c-ocean" value="#d0e8f5"></div>
      <div class="control-row"><label>Land</label><input type="color" id="c-land" value="#c8c4b8"></div>
      <div class="control-row"><label>Borders</label><label class="toggle"><input type="checkbox" id="show-borders" checked onchange="render()"><span class="toggle-slider"></span></label></div>
      <div class="control-row"><label>Border color</label><input type="color" id="c-border" value="#ffffff"></div>
      <div class="control-row"><label>Graticule</label><input type="color" id="c-grid" value="#a0c8e0"></div>
      <div class="control-row"><label>Grid opacity</label><input type="range" id="grid-opacity" min="0" max="100" value="35"></div>
      <div class="control-row" id="facet-row"><label>Outline</label><input type="color" id="c-facet" value="#888880"></div>
    </section>

    <section>
      <div class="section-label">Points</div>
      <div class="control-row"><label>Color</label><input type="color" id="c-point" value="#d85a30"></div>
      <div class="control-row"><label>Size</label><input type="range" id="point-size" min="2" max="36" value="5"></div>
      <div class="control-row"><label>Scale by population</label><label class="toggle"><input type="checkbox" id="pop-scale" onchange="render()"><span class="toggle-slider"></span></label></div>
      <div class="section-label" style="margin-top:10px">Location data (CSV)</div>
      <textarea id="csv-input" spellcheck="false">name,lat,lon,population
Nashville,36.1627,-86.7816,689447
New York,40.7128,-74.0060,8336817
London,51.5074,-0.1278,9002488
Tokyo,35.6762,139.6503,13960000
Sydney,-33.8688,151.2093,5312000
Sao Paulo,-23.5505,-46.6333,12325232
Cairo,30.0444,31.2357,10107125
Lagos,6.5244,3.3792,15388000</textarea>
      <p class="hint">Columns: name, lat, lon — and optionally population (or pop). First row is header.</p>
      <div class="error-box" id="csv-error"></div>
    </section>

    <section>
      <button class="btn-primary" onclick="render()">&#8635; Redraw</button>
      <button class="btn-secondary" onclick="exportSVG()">&#8595; Download SVG</button>
      <p class="status" id="status">Ready</p>
    </section>

  </aside>
  <main class="map-area">
    <div id="map-container">
      <svg id="map" width="0" height="0"></svg>
    </div>
  </main>
</div>
<div class="tooltip" id="tooltip"></div>

// ── Utilities ─────────────────────────────────────────────────────────────────
function parseCSV(text) {
  var lines = text.trim().split('\n').map(function(l){ return l.trim(); }).filter(Boolean);
  if (lines.length < 2) return { error: 'Need a header row and at least one data row.', points: [] };
  var header = lines[0].toLowerCase().split(',').map(function(h){ return h.trim(); });
  var ni   = header.findIndex(function(h){ return h === 'name'; });
  var lati = header.findIndex(function(h){ return h === 'lat'; });
  var loni = header.findIndex(function(h){ return h.indexOf('lon') === 0 || h === 'lng'; });
  var popi = header.findIndex(function(h){ return h === 'population' || h === 'pop'; });
  if (lati < 0 || loni < 0) return { error: 'CSV must have columns: name, lat, lon', points: [] };
  var points = [], errors = [];
  for (var i = 1; i < lines.length; i++) {
    var p = lines[i].split(',').map(function(s){ return s.trim(); });
    var lat = parseFloat(p[lati]), lon = parseFloat(p[loni]);
    if (isNaN(lat) || isNaN(lon)) { errors.push('Row ' + (i+1) + ': invalid lat/lon'); continue; }
    var pop = popi >= 0 ? parseFloat(p[popi]) : NaN;
    points.push({
      name:   ni >= 0 ? (p[ni] || 'Point ' + i) : 'Point ' + i,
      coords: [lon, lat],
      pop:    isNaN(pop) ? null : pop
    });
  }
  return { error: errors.length ? errors.join('; ') : null, points: points, hasPop: popi >= 0 };
}

function setStatus(msg) { document.getElementById('status').textContent = msg; }
function showError(msg) {
  var el = document.getElementById('csv-error');
  el.textContent = msg;
  el.style.display = msg ? 'block' : 'none';
}

// ── Projection switcher ───────────────────────────────────────────────────────
function onProjectionChange() {
  var key = document.getElementById('proj-select').value;
  var def = PROJECTIONS[key];

  // Rebuild preset buttons
  var container = document.getElementById('preset-buttons');
  container.innerHTML = '';
  def.presets.forEach(function(p) {
    var btn = document.createElement('button');
    btn.className = 'btn-preset';
    btn.textContent = p[3];
    btn.onclick = function() { setPreset(p[0], p[1], p[2]); };
    container.appendChild(btn);
  });

  // Show/hide facet edge control (only relevant for polyhedral/globe)
  document.getElementById('facet-row').style.display = def.showFacets ? 'flex' : 'none';

  // Apply first preset as default
  var first = def.presets[0];
  setPreset(first[0], first[1], first[2]);
}

// ── Main render ───────────────────────────────────────────────────────────────
function render() {
  setStatus('Drawing\u2026');
  showError('');

  var parsed = parseCSV(document.getElementById('csv-input').value);
  if (parsed.error) showError(parsed.error);
  var points = parsed.points;

  var key    = document.getElementById('proj-select').value;
  var def    = PROJECTIONS[key];

  var cOcean       = document.getElementById('c-ocean').value;
  var cLand        = document.getElementById('c-land').value;
  var cBorder      = document.getElementById('c-border').value;
  var cGrid        = document.getElementById('c-grid').value;
  var cFacet       = document.getElementById('c-facet').value;
  var cPoint       = document.getElementById('c-point').value;
  var gridOp       = document.getElementById('grid-opacity').value / 100;
  var ptR          = document.getElementById('point-size').value / 2;
  var showBorders  = document.getElementById('show-borders').checked;

  // Fit to available space with 20px padding
  var mapArea = document.querySelector('.map-area');
  var availW  = mapArea.clientWidth  - 40;
  var availH  = mapArea.clientHeight - 40;

  // Use the full available area as the canvas
  var W = availW;
  var H = availH;

  var lambda = parseFloat(document.getElementById('r-lambda').value);
  var phi    = parseFloat(document.getElementById('r-phi').value);
  var gamma  = parseFloat(document.getElementById('r-gamma').value);

  // Build projection with a temporary scale, then use fitSize to auto-fit
  // the sphere to the available canvas with 20px padding on each side
  var projection = def.fn(150, W, H, [lambda, phi, gamma]);
  projection.fitExtent([[20, 20], [W - 20, H - 20]], { type: 'Sphere' });

  var path  = d3.geoPath().projection(projection);
  var world = topojson.feature(WORLD_TOPO, WORLD_TOPO.objects.countries);

  var svg = d3.select('#map').attr('width', W).attr('height', H);
  svg.selectAll('*').remove();

  // White canvas background — always outside the map boundary
  svg.append('rect').attr('width', W).attr('height', H).attr('fill', '#ffffff');

  // Ocean fill clipped to the projection's sphere boundary
  svg.append('path')
    .datum({ type: 'Sphere' })
    .attr('d', path)
    .attr('fill', cOcean);

  // Graticule
  svg.append('path')
    .datum(d3.geoGraticule()())
    .attr('d', path)
    .attr('fill', 'none')
    .attr('stroke', cGrid)
    .attr('stroke-width', 0.4)
    .attr('opacity', gridOp);

  // Countries
  svg.append('g')
    .selectAll('path')
    .data(world.features)
    .join('path')
    .attr('d', path)
    .attr('fill', cLand)
    .attr('stroke', showBorders ? cBorder : 'none')
    .attr('stroke-width', 0.5);

  // Sphere / facet outline
  if (def.showFacets) {
    svg.append('path')
      .datum({ type: 'Sphere' })
      .attr('d', path)
      .attr('fill', 'none')
      .attr('stroke', cFacet)
      .attr('stroke-width', 0.8)
      .attr('opacity', 0.6);
  }

  // Points — scale by population if available and toggle is on
  var usePopScale = document.getElementById('pop-scale').checked && parsed.hasPop;
  var maxPop = 0;
  if (usePopScale) {
    parsed.points.forEach(function(pt) { if (pt.pop && pt.pop > maxPop) maxPop = pt.pop; });
  }

  var tooltip = document.getElementById('tooltip');
  points.forEach(function(pt) {
    var proj = projection(pt.coords);
    if (!proj) return;

    var r = ptR;
    if (usePopScale && pt.pop && maxPop > 0) {
      r = Math.max(2, ptR * Math.sqrt(pt.pop / maxPop));
    }

    svg.append('circle')
      .attr('cx', proj[0]).attr('cy', proj[1])
      .attr('r', r)
      .attr('fill', cPoint)
      .attr('stroke', '#fff')
      .attr('stroke-width', 1)
      .attr('opacity', 0.9)
      .on('mousemove', function(event) {
        tooltip.style.opacity = '1';
        tooltip.style.left = (event.clientX + 12) + 'px';
        tooltip.style.top  = (event.clientY - 8) + 'px';
        var popStr = pt.pop ? '  \u2022  pop. ' + pt.pop.toLocaleString() : '';
        tooltip.textContent = pt.name + '  (' + pt.coords[1].toFixed(2) + '\u00b0, ' + pt.coords[0].toFixed(2) + '\u00b0)' + popStr;
      })
      .on('mouseleave', function() { tooltip.style.opacity = '0'; });
  });

  setStatus(points.length + ' point' + (points.length !== 1 ? 's' : '') + ' plotted');
}

// ── Export ────────────────────────────────────────────────────────────────────
function exportSVG() {
  var svgEl = document.getElementById('map');
  var str = new XMLSerializer().serializeToString(svgEl);
  if (str.indexOf('xmlns=') < 0) str = str.replace('<svg', '<svg xmlns="http://www.w3.org/2000/svg"');
  var a = document.createElement('a');
  var projName = document.getElementById('proj-select').value;
  a.href = URL.createObjectURL(new Blob([str], { type: 'image/svg+xml' }));
  a.download = projName + '-map.svg';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setStatus('SVG downloaded');
}

// ── Rotation controls ─────────────────────────────────────────────────────────
function updateReadout() {
  var l = document.getElementById('r-lambda').value;
  var p = document.getElementById('r-phi').value;
  var g = document.getElementById('r-gamma').value;
  document.getElementById('rotate-readout').textContent = '[' + l + ', ' + p + ', ' + g + ']';
}

function setPreset(lambda, phi, gamma) {
  document.getElementById('r-lambda').value = lambda;
  document.getElementById('r-phi').value    = phi;
  document.getElementById('r-gamma').value  = gamma;
  document.getElementById('r-lambda-val').textContent = lambda + '\u00b0';
  document.getElementById('r-phi-val').textContent    = phi    + '\u00b0';
  document.getElementById('r-gamma-val').textContent  = gamma  + '\u00b0';
  updateReadout();
  render();
}

['r-lambda','r-phi','r-gamma'].forEach(function(id) {
  document.getElementById(id).addEventListener('input', function() {
    document.getElementById(id + '-val').textContent = this.value + '\u00b0';
    updateReadout();
  });
});

document.querySelectorAll('input[type="color"], input[type="range"]').forEach(function(el) {
  el.addEventListener('input', render);
});

window.addEventListener('load', function() { onProjectionChange(); });
window.addEventListener('resize', render);
</script>
